services:
  wa-webhook-router:
    build: .
    container_name: wa-webhook-router
    environment:
      # AWS Credentials (load from .env file)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}

      # SQS Configuration
      - QUEUE_URL=${QUEUE_URL}

      # Routing Configuration
      - DESTINATION_HOST=${DESTINATION_HOST}
      - PHONE_ROUTES=${PHONE_ROUTES}

      # WhatsApp API Token for downloading media
      - WHATSAPP_API_TOKEN=${WHATSAPP_API_TOKEN}

    restart: always

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

    # Logging
    logging:
        driver: "fluentd"
        options:
            fluentd-address: "localhost:24224"
            tag: "wa-webhook-router"
            fluentd-async: "true"
            fluentd-retry-wait: "1s"
            fluentd-max-retries: "3"

    # Health check - checks if node process is running
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "try{process.kill(1,0);process.exit(0)}catch(e){process.exit(1)}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
