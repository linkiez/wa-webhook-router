services:
  wa-webhook-router:
    build: .
    container_name: wa-webhook-router
    environment:
      # AWS Credentials (load from .env file)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
  
      # SQS Configuration
      - QUEUE_URL=${QUEUE_URL}

      # Routing Configuration
      - DESTINATION_HOST=${DESTINATION_HOST}
      - PHONE_ROUTES=${PHONE_ROUTES}

    restart: on-failure

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

    # Logging
    logging:
        driver: "fluentd"
        options:
            fluentd-address: "localhost:24224"  # Update with your Fluentd host & port
            tag: "wa-webhook-router"

    # Health check compatible with the distroless Node runtime
    healthcheck:
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "const fs=require('fs'); const cmdline=fs.readFileSync('/proc/1/cmdline','utf8'); process.exit(cmdline.includes('dist/index.js') ? 0 : 1);"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
