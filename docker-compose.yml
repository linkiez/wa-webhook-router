version: '3.8'

services:
  wa-webhook-router:
    build: .
    container_name: wa-webhook-router
    environment:
      # AWS Credentials (load from .env file)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      
      # SQS Configuration
      - QUEUE_URL=${QUEUE_URL}
      
      # Routing Configuration
      - DESTINATION_HOST=${DESTINATION_HOST}
      - PHONE_ROUTES=${PHONE_ROUTES}
    
    restart: unless-stopped
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Health check (optional - checks if process is running)
    healthcheck:
      test: ["CMD", "pgrep", "-f", "node"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
